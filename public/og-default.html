<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
  }
  .logo { font-size: 64px; font-weight: 800; letter-spacing: -2px; }
  .logo span { color: #3b82f6; }
  .tagline { font-size: 28px; color: #94a3b8; margin-top: 16px; }
  .stats { display: flex; gap: 48px; margin-top: 40px; }
  .stat { text-align: center; }
  .stat-label { font-size: 16px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; }
  .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; }
  .url { position: absolute; bottom: 32px; font-size: 20px; color: #475569; }
</style>
</head>
<body>
  <div class="logo">USCE<span>Hub</span></div>
  <div class="tagline">The Largest IMG Opportunities Database</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value">Observerships</div>
      <div class="stat-label">Clinical Programs</div>
    </div>
    <div class="stat">
      <div class="stat-value">Externships</div>
      <div class="stat-label">Hands-on Training</div>
    </div>
    <div class="stat">
      <div class="stat-value">Research</div>
      <div class="stat-label">Positions</div>
    </div>
  </div>
  <div class="url">uscehub.com</div>
</body>
</html>
